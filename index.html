<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Links | ASTRA Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* CashLane accent: purple/blue from logo */
            --cl-accent: #9b59f5;
            --cl-accent-2: #4f9cf9;
            /* BVS accent: teal from logo */
            --bvs-accent: #00c9a7;
            --bvs-accent-2: #0097a7;

            --bg: #0d0f14;
            --surface: #13161e;
            --surface-2: #1a1e28;
            --border: rgba(255,255,255,0.07);
            --text: #e8eaf0;
            --text-muted: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Subtle radial glow background */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(155, 89, 245, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(ellipse, rgba(0, 201, 167, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 860px;
        }

        /* Page Title */
        .page-title {
            text-align: center;
            margin-bottom: 52px;
        }

        .page-title h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .title-divider {
            width: 32px;
            height: 2px;
            background: linear-gradient(90deg, var(--cl-accent), var(--bvs-accent));
            margin: 14px auto 0;
            border-radius: 2px;
        }

        /* Grid layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 36px 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            border-radius: 16px 16px 0 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        /* CashLane cards */
        .card.cl {
            --card-accent: var(--cl-accent);
            --card-accent-2: var(--cl-accent-2);
        }
        .card.cl::before {
            background: linear-gradient(90deg, var(--cl-accent), var(--cl-accent-2));
        }
        .card.cl:hover {
            border-color: rgba(155, 89, 245, 0.3);
            box-shadow: 0 8px 32px rgba(155, 89, 245, 0.1);
        }
        .card.cl::before { opacity: 1; }

        /* BVS card */
        .card.bvs {
            --card-accent: var(--bvs-accent);
            --card-accent-2: var(--bvs-accent-2);
        }
        .card.bvs::before {
            background: linear-gradient(90deg, var(--bvs-accent), var(--bvs-accent-2));
        }
        .card.bvs:hover {
            border-color: rgba(0, 201, 167, 0.3);
            box-shadow: 0 8px 32px rgba(0, 201, 167, 0.1);
        }
        .card.bvs::before { opacity: 1; }

        /* Logo area */
        .logo-wrap {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wrap img {
            max-height: 64px;
            max-width: 170px;
            object-fit: contain;
            filter: brightness(1.05) saturate(1.1);
        }

        /* Card label */
        .card-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.4;
        }

        .card-label span {
            display: block;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            text-transform: none;
            letter-spacing: 0;
            margin-top: 4px;
        }

        /* Card type icon badge */
        .type-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: -6px;
        }

        .card.cl .type-icon {
            background: rgba(155, 89, 245, 0.12);
            color: var(--cl-accent);
        }

        .card.bvs .type-icon {
            background: rgba(0, 201, 167, 0.12);
            color: var(--bvs-accent);
        }

        /* Button group */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 18px;
            border-radius: 11px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            letter-spacing: 0.01em;
            border: none;
            cursor: pointer;
        }

        /* Form button — solid accent */
        .btn-form {
            background: linear-gradient(135deg, var(--card-accent), var(--card-accent-2));
            color: #ffffff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .btn-form:hover {
            filter: brightness(1.12);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.35);
        }

        .btn-form:active {
            transform: translateY(0);
        }

        /* Sheet button — ghost / outlined */
        .btn-sheet {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-sheet:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-1px);
        }

        .btn-sheet:active {
            transform: translateY(0);
        }

        /* Icons */
        .btn svg {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
        }

        /* Separator line between cards */
        .col-sep {
            display: none;
        }

        /* Footer */
        .footer {
            display: none;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .page-title { margin-bottom: 36px; }
        }
    </style>
</head>
<body>
<div class="wrapper">

    <div class="page-title">
        <h1>Quick Access Links</h1>
        <div class="title-divider"></div>
    </div>

    <div class="grid">

        <!-- CARD 1 · CashLane Software Issue -->
        <div class="card cl">
            <div class="logo-wrap">
                <img src="images.png" alt="CashLane">
            </div>
            <!-- Bug / wrench icon = software issues -->
            <div class="type-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"/>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    <circle cx="9" cy="9" r="2" fill="currentColor" opacity="0.25" stroke="none"/>
                    <!-- wrench overlay hint -->
                    <path d="M19 11a7 7 0 0 1-7 7" opacity="0.4"/>
                </svg>
            </div>
            <div class="card-label">
                CashLane
                <span>Software Issues</span>
            </div>
            <div class="btn-group">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSd6sc7pRUNB3REZ_EO0mcyLs4gfhO0ncebGBDSrd27dRqb8xA/viewform?usp=dialog" target="_blank" class="btn btn-form" id="cl-sw-form">
                    <!-- Pencil / form icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                    Log an Issue
                </a>
                <a href="https://docs.google.com/spreadsheets/d/1KcUwfiG58bJbi8o_Db-A11rzWXKNTtzxCxUkit_NDOI/edit?usp=sharing" target="_blank" class="btn btn-sheet" id="cl-sw-sheet">
                    <!-- Table / sheet icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="3" y1="15" x2="21" y2="15"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                    </svg>
                    View Spreadsheet
                </a>
            </div>
        </div>

        <!-- CARD 2 · CashLane Consumer Complaint -->
        <div class="card cl">
            <div class="logo-wrap">
                <img src="images.png" alt="CashLane">
            </div>
            <!-- Message / complaint icon -->
            <div class="type-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
            </div>
            <div class="card-label">
                CashLane
                <span>Consumer Complaints</span>
            </div>
            <div class="btn-group">
                <a href="https://forms.gle/UR8SiWfDKJkDX15b6" target="_blank" class="btn btn-form" id="cl-cc-form">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                    File a Complaint
                </a>
                <a href="https://docs.google.com/spreadsheets/d/1B5zj7Kuws_x2Y-QCJunAry-CAXnFpoblchmjyD3p9IY/edit?usp=sharing" target="_blank" class="btn btn-sheet" id="cl-cc-sheet">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="3" y1="15" x2="21" y2="15"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                    </svg>
                    View Spreadsheet
                </a>
            </div>
        </div>

        <!-- CARD 3 · BVS Consumer Complaint -->
        <div class="card bvs">
            <div class="logo-wrap">
                <img src="BVS.png" alt="Bayview Solutions">
            </div>
            <!-- Shield / complaint icon -->
            <div class="type-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
            </div>
            <div class="card-label">
                Bayview Solutions
                <span>Consumer Complaints</span>
            </div>
            <div class="btn-group">
                <a href="https://forms.gle/3N9SoAB9Ma3QhiU99" target="_blank" class="btn btn-form" id="bvs-cc-form">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                    File a Complaint
                </a>
                <a href="https://docs.google.com/spreadsheets/d/18v2PIF_cXK6eddpWo5jPUJJlAwzj8uFJBfwUzmoh9dI/edit?usp=sharing" target="_blank" class="btn btn-sheet" id="bvs-cc-sheet">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="3" y1="15" x2="21" y2="15"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                    </svg>
                    View Spreadsheet
                </a>
            </div>
        </div>

    </div>

    <div class="footer">Replace the <code style="font-family:monospace; color:#9ca3af;">#</code> in each button's <code style="font-family:monospace; color:#9ca3af;">href</code> with the actual link.</div>

</div>
</body>
</html>
